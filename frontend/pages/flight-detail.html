<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flight Details — OPSEAZY</title>
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/navbar.css">
  <link rel="stylesheet" href="/css/results.css">
  <style>
    .detail-page { min-height: 100vh; background: var(--color-gray-50); }
    .detail-header { background: var(--color-violet); padding: var(--space-6) 0; color: #fff; }
    .detail-header h2 { font-size: 1.5rem; font-weight: 700; color: #fff; }
    .detail-header-sub { color: rgb(255 255 255 / 0.75); margin-top: 0.25rem; }
    .detail-body { padding: var(--space-8) 0 var(--space-12); }
    .detail-layout { display: grid; grid-template-columns: 1fr 340px; gap: var(--space-6); align-items: flex-start; }
    .segment-card { background: var(--color-white); border-radius: var(--radius-xl); border: 1px solid var(--color-gray-100); box-shadow: var(--shadow-card); padding: var(--space-6); margin-bottom: var(--space-4); }
    .segment-header { display: flex; align-items: center; gap: var(--space-3); margin-bottom: var(--space-5); }
    .segment-leg { font-size: 0.8125rem; font-weight: 700; color: var(--color-violet); text-transform: uppercase; letter-spacing: 0.06em; background: var(--color-violet-light); padding: 0.25rem 0.625rem; border-radius: var(--radius-full); }
    .segment-timeline { position: relative; padding-left: 1.5rem; }
    .timeline-dot { position: absolute; left: 0; width: 12px; height: 12px; border-radius: 50%; background: var(--color-sky); border: 2px solid #fff; box-shadow: 0 0 0 2px var(--color-sky); }
    .timeline-line { position: absolute; left: 5px; top: 12px; bottom: 0; width: 2px; background: var(--color-gray-200); }
    .timeline-stop { margin-bottom: var(--space-5); position: relative; }
    .timeline-time { font-family: var(--font-display); font-size: 1.375rem; font-weight: 700; color: var(--color-gray-900); }
    .timeline-airport { font-size: 0.9375rem; color: var(--color-gray-600); margin-top: 0.125rem; }
    .timeline-iata { font-weight: 700; color: var(--color-gray-800); }
    .timeline-dur { display: flex; align-items: center; gap: var(--space-2); font-size: 0.8125rem; color: var(--color-gray-400); padding: var(--space-3) 0; }
    .map-card { background: var(--color-white); border-radius: var(--radius-xl); border: 1px solid var(--color-gray-100); box-shadow: var(--shadow-card); overflow: hidden; margin-bottom: var(--space-4); }
    .map-container { height: 280px; background: var(--color-gray-100); position: relative; }
    #flight-map { width: 100%; height: 100%; }
    .map-placeholder { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--color-gray-400); font-size: 0.9375rem; }
    .map-info { padding: var(--space-4); border-top: 1px solid var(--color-gray-100); display: flex; gap: var(--space-6); flex-wrap: wrap; }
    .map-stat { display: flex; flex-direction: column; }
    .map-stat-label { font-size: 0.75rem; font-weight: 600; color: var(--color-gray-400); text-transform: uppercase; letter-spacing: 0.05em; }
    .map-stat-value { font-family: var(--font-display); font-weight: 700; font-size: 1.0625rem; color: var(--color-gray-800); margin-top: 0.125rem; }
    .fare-detail-card { background: var(--color-white); border-radius: var(--radius-xl); border: 1px solid var(--color-gray-100); box-shadow: var(--shadow-card); overflow: hidden; position: sticky; top: 80px; }
    .fare-detail-header { background: linear-gradient(135deg, var(--color-violet), var(--color-sky)); padding: var(--space-5); color: #fff; }
    .fare-detail-header h3 { font-size: 1rem; font-weight: 700; color: #fff; }
    .fare-big { font-family: var(--font-display); font-size: 2rem; font-weight: 800; color: #fff; margin-top: var(--space-2); }
    .fare-detail-body { padding: var(--space-5); }
    .fare-row { display: flex; justify-content: space-between; padding: 0.375rem 0; font-size: 0.9375rem; color: var(--color-gray-600); border-bottom: 1px solid var(--color-gray-50); }
    .fare-row:last-child { border-bottom: none; }
    .fare-total { display: flex; justify-content: space-between; padding: var(--space-4) var(--space-5); font-family: var(--font-display); font-weight: 800; font-size: 1.0625rem; background: var(--color-gray-50); }
    .fare-total-val { color: var(--color-orange); }
    .btn-proceed { margin: var(--space-5); width: calc(100% - 2.5rem); }
    @media (max-width: 900px) { .detail-layout { grid-template-columns: 1fr; } .fare-detail-card { position: static; } }
  </style>
</head>
<body class="detail-page">

  <div id="navbar-mount"></div>

  <div class="detail-header">
    <div class="container">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
        <div>
          <h2 id="detail-route-title">— → —</h2>
          <div class="detail-header-sub" id="detail-meta"></div>
        </div>
        <button onclick="history.back()" class="btn btn-outline" style="border-color:rgba(255,255,255,0.4);color:#fff;">← Back to Results</button>
      </div>
    </div>
  </div>

  <div class="detail-body">
    <div class="container">
      <div id="detail-loading" class="loading-state">
        <div class="spinner spinner-lg"></div>
        <p>Loading flight details…</p>
      </div>
      <div id="detail-content" class="detail-layout hidden">
        <!-- Left: itinerary + map -->
        <div>
          <div id="itinerary-section"></div>
          <!-- Map -->
          <div class="map-card">
            <div class="map-container">
              <div id="flight-map"></div>
              <div id="map-placeholder" class="map-placeholder">
                <span>🗺 Map requires Google Maps API key</span>
              </div>
            </div>
            <div class="map-info" id="map-info">
              <div class="map-stat">
                <span class="map-stat-label">Distance</span>
                <span class="map-stat-value" id="map-distance">—</span>
              </div>
              <div class="map-stat">
                <span class="map-stat-label">Origin</span>
                <span class="map-stat-value" id="map-origin">—</span>
              </div>
              <div class="map-stat">
                <span class="map-stat-label">Destination</span>
                <span class="map-stat-value" id="map-dest">—</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Right: fare summary -->
        <div>
          <div class="fare-detail-card">
            <div class="fare-detail-header">
              <h3>Fare Summary</h3>
              <div class="fare-big" id="detail-total-fare">—</div>
              <div style="font-size:0.8125rem;color:rgba(255,255,255,0.75);margin-top:0.25rem;" id="detail-fare-sub"></div>
            </div>
            <div class="fare-detail-body" id="fare-breakdown"></div>
            <div class="fare-total">
              <span>Total</span>
              <span class="fare-total-val" id="detail-fare-total">—</span>
            </div>
            <div style="padding:var(--space-4) var(--space-5) var(--space-2);">
              <div class="badge badge-mint" style="margin-bottom:var(--space-3);">✓ Price confirmed before booking</div>
            </div>
            <button class="btn btn-primary btn-full btn-lg btn-proceed" id="btn-proceed-booking">Continue to Book →</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/flight-detail.js"></script>
  <!-- Google Maps loaded dynamically by flight-detail.js once key is available -->
</body>
</html>
