version: "3.9"

services:

  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: opseazy
      POSTGRES_USER: opseazy
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opseazy -d opseazy"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - opseazy-net

  # ─── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: ./backend/.env
    environment:
      POSTGRES_HOST: postgres
    # Run migrations + seed, then start server
    command: >
      sh -c "
        npm run migrate &&
        npm run seed &&
        npm start
      "
    networks:
      - opseazy-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Frontend (nginx) ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - opseazy-net

volumes:
  pgdata:

networks:
  opseazy-net:
    driver: bridge
